<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent Price Prediction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Rent Price Estimator Vienna</h1>
        <form id="prediction-form">

            <div class="form-group">
                <label for="area_sqm">Area (m²):</label>
                <input type="number" id="area_sqm" step="1" value="50" required>
            </div>

            <div class="form-group">
                <label for="rooms">Number of Rooms:</label>
                <input type="number" id="rooms" step="1" value="2" required>
            </div>

            <div class="form-group">
                <label for="district">District:</label>
                <select id="district" name="district-selector"></select>
            </div>

            <div class="checkbox-group">
                <label><input type="checkbox" id="has_balcony"> Has Balcony</label>
                <label><input type="checkbox" id="has_terrace"> Has Terrace</label>
                <label><input type="checkbox" id="is_furnished"> Is Furnished</label>
                <label><input type="checkbox" id="is_social_housing"> Social Housing</label>
            </div>

            <button type="submit">Calculate Price</button>
        </form>

        <div id="result-container">
            Predicted Price: <span id="prediction-result">...</span> €/month
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
